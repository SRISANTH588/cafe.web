<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Ayyan Cafe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6B4423, #A0522D);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            background: white;
            border-radius: 25px;
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 3px solid #FFD700; }
        .header h1 { font-size: 2rem; color: #6B4423; }
        .header p { color: #8B5A3C; font-weight: 600; }
        .status { display: inline-block; padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.9rem; font-weight: bold; margin-top: 0.5rem; background: #ffc107; color: white; }
        .status.paid { background: #28a745; }
        .token-box {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .token-label { font-size: 1rem; color: #6B4423; font-weight: bold; letter-spacing: 2px; }
        .token-num { font-size: 4rem; font-weight: bold; color: #6B4423; }
        .qr-box { text-align: center; padding: 1.5rem; background: #f8f9fa; border-radius: 20px; margin-bottom: 1.5rem; }
        .qr-box h3 { color: #6B4423; margin-bottom: 1rem; }
        #qrcode { width: 260px; height: 260px; margin: 0 auto; border: 4px solid #6B4423; border-radius: 12px; padding: 8px; background: white; }
        .upi-id { color: #6B4423; font-weight: bold; margin-top: 1rem; padding: 0.7rem; background: white; border-radius: 10px; border: 2px dashed #6B4423; }
        .bill-box { background: #f8f9fa; padding: 1.5rem; border-radius: 20px; margin-bottom: 1.5rem; }
        .bill-box h3 { color: #6B4423; margin-bottom: 1rem; border-bottom: 2px solid #6B4423; padding-bottom: 0.5rem; }
        .bill-item { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid #ddd; }
        .bill-total { display: flex; justify-content: space-between; padding: 1rem; font-size: 1.8rem; font-weight: bold; color: #6B4423; border-top: 3px solid #6B4423; margin-top: 0.5rem; background: white; border-radius: 10px; }
        .btn { width: 100%; padding: 1.1rem; color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 0.8rem; }
        .btn-green { background: linear-gradient(135deg, #28a745, #20c997); }
        .btn-brown { background: linear-gradient(135deg, #6B4423, #8B5A3C); }
        .nav { display: flex; gap: 1rem; margin-top: 0.8rem; }
        .nav-btn { flex: 1; padding: 0.9rem; background: linear-gradient(135deg, #007bff, #0056b3); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .counter { text-align: center; margin-top: 0.8rem; color: #6B4423; font-weight: bold; }
        .toggle-row { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 0.8rem; padding: 0.7rem; background: #f8f9fa; border-radius: 10px; }
        .toggle { position: relative; width: 48px; height: 24px; background: #ccc; border-radius: 24px; cursor: pointer; transition: background 0.3s; }
        .toggle.on { background: #28a745; }
        .toggle-knob { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: transform 0.3s; }
        .toggle.on .toggle-knob { transform: translateX(24px); }
        .sync-status { text-align: center; font-size: 0.8rem; color: #999; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 id="cafeName">☕ Ayyan Cafe</h1>
        <p>Online Payment Portal</p>
        <div class="status" id="statusBadge">⏳ Payment Pending</div>
    </div>

    <div class="token-box">
        <div class="token-label">TOKEN NUMBER</div>
        <div class="token-num" id="tokenNumber">-</div>
    </div>

    <div class="qr-box">
        <h3>📱 Scan QR Code to Pay</h3>
        <div id="qrcode"></div>
        <div class="upi-id" id="upiId">-</div>
    </div>

    <div class="bill-box">
        <h3>📋 Bill Details</h3>
        <div id="billItems"></div>
        <div class="bill-total">
            <span>Total:</span>
            <span>₹<span id="totalAmount">0</span></span>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)" disabled>Next →</button>
    </div>
    <div class="counter" id="counter">No pending orders</div>

    <div class="toggle-row">
        <span style="color:#6B4423;font-weight:bold;">Auto-Update:</span>
        <div class="toggle on" id="toggle" onclick="toggleAuto()"><div class="toggle-knob"></div></div>
        <span id="toggleLabel" style="color:#28a745;font-weight:bold;">ON</span>
    </div>
    <div class="sync-status" id="syncStatus">Connecting...</div>

    <button class="btn btn-green" id="confirmBtn" onclick="confirmPayment()">✅ Confirm Payment</button>
    <button class="btn btn-brown" onclick="window.close()">✕ Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
    const SYNC_URL = 'https://script.google.com/macros/s/AKfycby0iODTYo1xjPzRs0pgUMQlgwxj96FFjX_QnknS5I_p2eolZzTdxhuUNwoxwGq59mks/exec';

    let orders = [];
    let index = 0;
    let autoOn = true;
    let lastToken = null;

    async function fetchOrders() {
        try {
            const res = await fetch(SYNC_URL + '?t=' + Date.now());
            const data = await res.json();
            document.getElementById('syncStatus').textContent = 'Last sync: ' + new Date().toLocaleTimeString();
            // Apps Script returns the raw saved data - parse currentPayment from it
            let payment = null;
            if (data.currentPayment) payment = data.currentPayment;
            else if (data.token) payment = data;
            if (payment && payment.token) return [payment];
            return [];
        } catch(e) {
            document.getElementById('syncStatus').textContent = '⚠️ Sync failed - retrying...';
            return null;
        }
    }

    async function refresh() {
        if (!autoOn) return;
        const fetched = await fetchOrders();
        if (fetched === null) return;

        orders = fetched;

        if (orders.length === 0) {
            showEmpty();
            return;
        }

        // Auto-jump to newest token
        const newest = orders[0];
        if (lastToken !== newest.token) {
            lastToken = newest.token;
            index = 0;
        }

        render(orders[index]);
        updateNav();
    }

    function render(order) {
        if (!order) return showEmpty();

        document.getElementById('tokenNumber').textContent = order.token || '-';
        document.getElementById('totalAmount').textContent = order.total || '0';
        document.getElementById('upiId').textContent = '💳 ' + (order.upiId || 'UPI ID not set');
        document.getElementById('statusBadge').textContent = '⏳ Payment Pending';
        document.getElementById('statusBadge').className = 'status';
        document.getElementById('confirmBtn').disabled = false;
        document.getElementById('confirmBtn').textContent = '✅ Confirm Payment';
        document.title = 'Payment - Token #' + order.token;

        const billDiv = document.getElementById('billItems');
        billDiv.innerHTML = '';
        (order.items || []).forEach(item => {
            const d = document.createElement('div');
            d.className = 'bill-item';
            d.innerHTML = `<span>${item.name} × ${item.qty}</span><span>₹${item.price * item.qty}</span>`;
            billDiv.appendChild(d);
        });

        const qrDiv = document.getElementById('qrcode');
        qrDiv.innerHTML = '';
        if (order.upiId && order.total) {
            const upi = `upi://pay?pa=${order.upiId}&pn=AyyanCafe&am=${order.total}&cu=INR&tn=Token${order.token}`;
            new QRCode(qrDiv, { text: upi, width: 260, height: 260, colorDark: '#6B4423', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
        }
    }

    function showEmpty() {
        document.getElementById('tokenNumber').textContent = '-';
        document.getElementById('totalAmount').textContent = '0';
        document.getElementById('billItems').innerHTML = '<p style="text-align:center;color:#999;padding:1rem;">No pending orders</p>';
        document.getElementById('qrcode').innerHTML = '';
        document.getElementById('upiId').textContent = '💳 No pending payments';
        document.getElementById('statusBadge').textContent = '✅ All Clear';
        document.getElementById('statusBadge').className = 'status paid';
        document.getElementById('confirmBtn').disabled = true;
        document.getElementById('counter').textContent = 'No pending orders';
        document.getElementById('prevBtn').disabled = true;
        document.getElementById('nextBtn').disabled = true;
    }

    function updateNav() {
        document.getElementById('prevBtn').disabled = index === 0;
        document.getElementById('nextBtn').disabled = index >= orders.length - 1;
        document.getElementById('counter').textContent = orders.length > 0 ? `Order ${index + 1} of ${orders.length}` : 'No pending orders';
    }

    function navigate(dir) {
        index = Math.max(0, Math.min(orders.length - 1, index + dir));
        render(orders[index]);
        updateNav();
    }

    function toggleAuto() {
        autoOn = !autoOn;
        const t = document.getElementById('toggle');
        t.className = 'toggle' + (autoOn ? ' on' : '');
        document.getElementById('toggleLabel').textContent = autoOn ? 'ON' : 'OFF';
        document.getElementById('toggleLabel').style.color = autoOn ? '#28a745' : '#dc3545';
    }

    async function confirmPayment() {
        const order = orders[index];
        if (!order) return;
        if (!confirm(`Confirm payment for Token #${order.token}?\n\nVerify in your UPI app first.`)) return;

        document.getElementById('statusBadge').textContent = '✅ Confirmed';
        document.getElementById('statusBadge').className = 'status paid';
        document.getElementById('confirmBtn').disabled = true;
        document.getElementById('confirmBtn').textContent = '✅ Confirmed';

        try {
            await fetch(SYNC_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'confirmPayment', token: order.token })
            });
        } catch(e) {}

        setTimeout(() => {
            orders.splice(index, 1);
            if (index >= orders.length) index = Math.max(0, orders.length - 1);
            orders.length === 0 ? showEmpty() : render(orders[index]);
            updateNav();
        }, 1500);
    }

    // Init
    const name = localStorage.getItem('cafeName') || 'Ayyan Cafe';
    document.getElementById('cafeName').textContent = '☕ ' + name;

    refresh();
    setInterval(refresh, 2000);

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') navigate(-1);
        if (e.key === 'ArrowRight') navigate(1);
        if (e.key === 'Enter') confirmPayment();
    });
</script>
</body>
</html>
