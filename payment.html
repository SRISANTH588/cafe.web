<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Ayyan Cafe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6B4423, #A0522D);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .notif-bar {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 1rem; text-align: center; font-weight: bold;
            font-size: 1rem; z-index: 999; transform: translateY(-100%);
            transition: transform 0.4s ease;
        }
        .notif-bar.show { transform: translateY(0); }
        .notif-bar.success { background: #28a745; color: white; }
        .notif-bar.error { background: #dc3545; color: white; }
        .notif-bar.info { background: #007bff; color: white; }
        .container {
            background: white; border-radius: 25px; padding: 2rem;
            max-width: 480px; width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            margin-top: 1rem;
        }
        .header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 3px solid #FFD700; }
        .header h1 { font-size: 1.8rem; color: #6B4423; }
        .header p { color: #8B5A3C; font-weight: 600; font-size: 0.95rem; }
        .status { display: inline-block; padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-top: 0.4rem; background: #ffc107; color: white; }
        .status.paid { background: #28a745; }
        .token-box {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 1.2rem; border-radius: 20px; text-align: center; margin-bottom: 1.2rem;
        }
        .token-label { font-size: 0.9rem; color: #6B4423; font-weight: bold; letter-spacing: 2px; }
        .token-num { font-size: 3.5rem; font-weight: bold; color: #6B4423; }
        .qr-box { text-align: center; padding: 1.2rem; background: #f8f9fa; border-radius: 20px; margin-bottom: 1.2rem; }
        .qr-box h3 { color: #6B4423; margin-bottom: 0.8rem; font-size: 1.1rem; }
        #qrcode { width: 240px; height: 240px; margin: 0 auto; border: 4px solid #6B4423; border-radius: 12px; padding: 8px; background: white; }
        .upi-id { color: #6B4423; font-weight: bold; margin-top: 0.8rem; padding: 0.6rem; background: white; border-radius: 10px; border: 2px dashed #6B4423; font-size: 0.95rem; }
        .bill-box { background: #f8f9fa; padding: 1.2rem; border-radius: 20px; margin-bottom: 1.2rem; }
        .bill-box h3 { color: #6B4423; margin-bottom: 0.8rem; border-bottom: 2px solid #6B4423; padding-bottom: 0.4rem; font-size: 1.1rem; }
        .bill-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #ddd; font-size: 1rem; }
        .bill-total { display: flex; justify-content: space-between; padding: 0.8rem; font-size: 1.5rem; font-weight: bold; color: #6B4423; border-top: 3px solid #6B4423; margin-top: 0.5rem; background: white; border-radius: 10px; }
        .nav { display: flex; gap: 0.8rem; margin-bottom: 0.5rem; }
        .nav-btn { flex: 1; padding: 0.8rem; background: linear-gradient(135deg, #007bff, #0056b3); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .counter { text-align: center; margin-bottom: 0.8rem; color: #6B4423; font-weight: bold; font-size: 0.95rem; }
        .toggle-row { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.5rem; padding: 0.6rem; background: #f8f9fa; border-radius: 10px; }
        .toggle { position: relative; width: 48px; height: 24px; background: #ccc; border-radius: 24px; cursor: pointer; transition: background 0.3s; }
        .toggle.on { background: #28a745; }
        .toggle-knob { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: transform 0.3s; }
        .toggle.on .toggle-knob { transform: translateX(24px); }
        .sync-status { text-align: center; font-size: 0.75rem; color: #999; margin-bottom: 0.8rem; }
        .btn { width: 100%; padding: 1rem; color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 0.5rem; }
        .btn-green { background: linear-gradient(135deg, #28a745, #20c997); }
        .btn-brown { background: linear-gradient(135deg, #6B4423, #8B5A3C); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .empty-state { text-align: center; padding: 2rem; color: #999; font-size: 1rem; }
    </style>
</head>
<body>

<div class="notif-bar" id="notifBar"></div>

<div class="container">
    <div class="header">
        <h1 id="cafeName">☕</h1>
        <p>Online Payment Portal</p>
        <div class="status" id="statusBadge">⏳ Payment Pending</div>
    </div>

    <div class="token-box">
        <div class="token-label">TOKEN NUMBER</div>
        <div class="token-num" id="tokenNumber">-</div>
    </div>

    <div class="qr-box">
        <h3>📱 Scan QR Code to Pay</h3>
        <div id="qrcode"></div>
        <div class="upi-id" id="upiId">-</div>
    </div>

    <div class="bill-box">
        <h3>📋 Bill Details</h3>
        <div id="billItems"><p class="empty-state">No pending orders</p></div>
        <div class="bill-total">
            <span>Total:</span>
            <span>₹<span id="totalAmount">0</span></span>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)" disabled>Next →</button>
    </div>
    <div class="counter" id="counter">No pending orders</div>

    <div class="toggle-row">
        <span style="color:#6B4423;font-weight:bold;">Auto-Update:</span>
        <div class="toggle on" id="toggle" onclick="toggleAuto()"><div class="toggle-knob"></div></div>
        <span id="toggleLabel" style="color:#28a745;font-weight:bold;">ON</span>
    </div>
    <div class="sync-status" id="syncStatus">Connecting...</div>

    <button class="btn btn-green" id="doneBtn" onclick="paymentDone()" disabled>💰 Payment Done</button>
    <button class="btn btn-brown" onclick="window.close()" style="margin-top:0.5rem;">✕ Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
    const SYNC_URL = 'https://script.google.com/macros/s/AKfycbz564SK2y9vkJF2ajmAydPCq2yprI_F2Jl4lsvW2-7_7PoM6O_3r4aYkTudZMmVocka/exec';

    let orders = [];
    let index = 0;
    let autoOn = true;
    let lastToken = null;
    let savedCafeName = '';

    function showNotif(msg, type = 'success') {
        const bar = document.getElementById('notifBar');
        bar.textContent = msg;
        bar.className = 'notif-bar show ' + type;
        setTimeout(() => bar.className = 'notif-bar', 4000);
    }

    async function fetchOrders() {
        try {
            const res = await fetch(SYNC_URL + '?t=' + Date.now());
            const data = await res.json();
            document.getElementById('syncStatus').textContent = 'Last sync: ' + new Date().toLocaleTimeString();
            if (data.orders && Array.isArray(data.orders)) return data.orders;
            if (data.currentPayment && data.currentPayment.token) return [data.currentPayment];
            if (data.token) return [data];
            return [];
        } catch(e) {
            document.getElementById('syncStatus').textContent = '⚠️ Sync failed - retrying...';
            return null;
        }
    }

    async function refresh() {
        if (!autoOn) return;
        const fetched = await fetchOrders();
        if (fetched === null) return;

        const prevLen = orders.length;
        orders = fetched;

        if (orders.length === 0) { showEmpty(); return; }

        // Auto jump to newest only if new order arrived
        const newest = orders[0];
        if (lastToken !== newest.token) {
            lastToken = newest.token;
            index = 0;
            if (prevLen > 0) showNotif('🔔 New order! Token #' + newest.token, 'info');
        }

        // Keep index in bounds
        if (index >= orders.length) index = orders.length - 1;

        render(orders[index]);
        updateNav();
    }

    function render(order) {
        if (!order) return showEmpty();

        const cafeName = order.cafeName || savedCafeName || '';
        if (cafeName) { savedCafeName = cafeName; document.getElementById('cafeName').textContent = '☕ ' + cafeName; }
        document.getElementById('tokenNumber').textContent = order.token || '-';
        document.getElementById('totalAmount').textContent = order.total || '0';
        document.getElementById('upiId').textContent = '💳 ' + (order.upiId || 'UPI ID not set');
        document.getElementById('statusBadge').textContent = '⏳ Payment Pending';
        document.getElementById('statusBadge').className = 'status';
        document.getElementById('doneBtn').disabled = false;
        document.getElementById('doneBtn').textContent = '💰 Payment Done';
        document.title = 'Payment - Token #' + order.token;

        const billDiv = document.getElementById('billItems');
        billDiv.innerHTML = '';
        (order.items || []).forEach(item => {
            const d = document.createElement('div');
            d.className = 'bill-item';
            d.innerHTML = `<span>${item.name} × ${item.qty}</span><span>₹${item.price * item.qty}</span>`;
            billDiv.appendChild(d);
        });

        const qrDiv = document.getElementById('qrcode');
        qrDiv.innerHTML = '';
        if (order.upiId && order.total) {
            const upi = `upi://pay?pa=${order.upiId}&pn=${encodeURIComponent(cafeName)}&am=${order.total}&cu=INR&tn=Token${order.token}`;
            new QRCode(qrDiv, { text: upi, width: 240, height: 240, colorDark: '#6B4423', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
        }
    }

    function showEmpty() {
        document.getElementById('tokenNumber').textContent = '-';
        document.getElementById('totalAmount').textContent = '0';
        document.getElementById('billItems').innerHTML = '<p class="empty-state">No pending orders</p>';
        document.getElementById('qrcode').innerHTML = '';
        document.getElementById('upiId').textContent = '💳 No pending payments';
        document.getElementById('statusBadge').textContent = '✅ All Clear';
        document.getElementById('statusBadge').className = 'status paid';
        document.getElementById('doneBtn').disabled = true;
        document.getElementById('counter').textContent = 'No pending orders';
        document.getElementById('prevBtn').disabled = true;
        document.getElementById('nextBtn').disabled = true;
        // Never clear cafe name
    }

    function updateNav() {
        document.getElementById('prevBtn').disabled = index <= 0;
        document.getElementById('nextBtn').disabled = index >= orders.length - 1;
        document.getElementById('counter').textContent = orders.length > 0
            ? `Order ${index + 1} of ${orders.length} pending`
            : 'No pending orders';
    }

    function navigate(dir) {
        const newIndex = index + dir;
        if (newIndex < 0 || newIndex >= orders.length) return;
        index = newIndex;
        render(orders[index]);
        updateNav();
    }

    function toggleAuto() {
        autoOn = !autoOn;
        document.getElementById('toggle').className = 'toggle' + (autoOn ? ' on' : '');
        document.getElementById('toggleLabel').textContent = autoOn ? 'ON' : 'OFF';
        document.getElementById('toggleLabel').style.color = autoOn ? '#28a745' : '#dc3545';
    }

    async function paymentDone() {
        const order = orders[index];
        if (!order) return;

        document.getElementById('statusBadge').textContent = '✅ Payment Done';
        document.getElementById('statusBadge').className = 'status paid';
        document.getElementById('doneBtn').disabled = true;
        document.getElementById('doneBtn').textContent = '✅ Done';

        showNotif(`✅ Payment confirmed for Token #${order.token} - ₹${order.total}`, 'success');

        // Send paid notification to Apps Script (cafe.html will pick it up)
        const paidData = encodeURIComponent(JSON.stringify({
            paidToken: order.token,
            total: order.total,
            items: order.items,
            cafeName: order.cafeName,
            paidAt: Date.now()
        }));
        new Image().src = SYNC_URL + '?paid=' + paidData;

        // Remove from local list after 2 seconds
        setTimeout(() => {
            orders.splice(index, 1);
            if (index >= orders.length) index = Math.max(0, orders.length - 1);
            orders.length === 0 ? showEmpty() : render(orders[index]);
            updateNav();
        }, 2000);
    }

    refresh();
    setInterval(refresh, 2000);

    // Load cafe name immediately on open
    fetch(SYNC_URL + '?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            const name = data.cafeName || (data.orders && data.orders[0] && data.orders[0].cafeName) || '';
            if (name) { savedCafeName = name; document.getElementById('cafeName').textContent = '☕ ' + name; }
        }).catch(() => {});

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') navigate(-1);
        if (e.key === 'ArrowRight') navigate(1);
        if (e.key === 'Enter') paymentDone();
    });
</script>
</body>
</html>
